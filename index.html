<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Love Algorithm v2.0</title>

<style>
body {
    margin: 0;
    padding: 0;
    font-family: "Courier New", monospace;
    background: linear-gradient(135deg, #0f172a, #020617);
    color: #e2e8f0;
    text-align: center;
    overflow: hidden;
}

/* Container */
.container {
    margin-top: 120px;
}

/* Title animation */
h1 {
    font-size: 28px;
    color: #38bdf8;
    animation: glow 2s infinite alternate;
}

@keyframes glow {
    from { text-shadow: 0 0 10px #38bdf8; }
    to { text-shadow: 0 0 25px #38bdf8; }
}

p {
    margin: 20px;
}

/* Buttons */
.btn {
    display: inline-block;
    padding: 12px 25px;
    margin: 15px;
    border-radius: 12px;
    text-decoration: none;
    font-weight: bold;
    transition: 0.3s;
}

/* YES button */
.yes {
    background: #22c55e;
    color: white;
}

.yes:hover {
    transform: scale(1.2);
    box-shadow: 0 0 15px #22c55e;
}

/* NO button escapes */
.no {
    background: #ef4444;
    color: white;
    position: relative;
}

.no:hover {
    animation: run 0.5s infinite;
}

@keyframes run {
    0% { left: 0; top: 0; }
    25% { left: -20px; top: 10px; }
    50% { left: 20px; top: -10px; }
    75% { left: -15px; top: 5px; }
    100% { left: 15px; top: -5px; }
}

/* Screens */
.screen {
    display: none;
    margin-top: 30px;
}

/* Show screens */
#yes:target ~ .yes-screen {
    display: block;
}

#no:target ~ .no-screen {
    display: block;
}

/* Loader animation */
.loader {
    margin-top: 20px;
    font-size: 18px;
}

.dots::after {
    content: "";
    animation: dots 1.5s infinite;
}

@keyframes dots {
    0% { content: ""; }
    33% { content: "."; }
    66% { content: ".."; }
    100% { content: "..."; }
}

/* Success message */
.success {
    color: #22c55e;
    font-size: 20px;
    margin-top: 20px;
    animation: fadeIn 2s ease-in;
}

@keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
}

/* Sad message */
.error {
    color: #ef4444;
    margin-top: 20px;
}

/* Floating hearts */
.heart {
    position: absolute;
    color: #22c55e;
    font-size: 20px;
    animation: float 5s linear infinite;
}

@keyframes float {
    from { transform: translateY(100vh); opacity: 1; }
    to { transform: translateY(-10vh); opacity: 0; }
}
</style>

</head>
<body>

<div class="container">
    <h1>💻 Love Algorithm v2.0</h1>
    <p>Running final check...<br>Do you like me? 🤔</p>

    <a href="#yes" class="btn yes">Yes 💚</a>
    <a href="#no" class="btn no">No 💔</a>

    <div id="yes"></div>
    <div id="no"></div>

    <!-- YES SCREEN -->
    <div class="screen yes-screen">
        <div class="loader">
            Analyzing feelings<span class="dots"></span>
        </div>
        <div class="success">
            ✅ MATCH FOUND 😍<br>
            Initializing Date.exe... 💖
        </div>
    </div>

    <!-- NO SCREEN -->
    <div class="screen no-screen">
        <div class="error">
            ❌ ERROR 404: Feelings Not Found 😭<br>
            Retrying connection forever...
        </div>
    </div>
</div>

<!-- Floating hearts -->
<div class="heart" style="left:10%; animation-delay:0s;">💚</div>
<div class="heart" style="left:30%; animation-delay:1s;">💚</div>
<div class="heart" style="left:50%; animation-delay:2s;">💚</div>
<div class="heart" style="left:70%; animation-delay:3s;">💚</div>
<div class="heart" style="left:90%; animation-delay:4s;">💚</div>

</body>
</html>
